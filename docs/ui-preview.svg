    <rect x="270" y="12" width="46" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <text x="281" y="33" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13">设置</text>

    <text x="14" y="72" fill="#59657a" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">当前模式</text>
    <rect x="14" y="84" width="302" height="34" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <text x="26" y="106" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13">Extra High</text>

    <rect x="14" y="130" width="142" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <rect x="26" y="141" width="11" height="11" rx="2" fill="#2563eb"/>
    <text x="45" y="151" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="12">自动记录</text>
    <rect x="166" y="130" width="150" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <rect x="178" y="141" width="11" height="11" rx="2" fill="#2563eb"/>
    <text x="197" y="151" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="12">自动识别模式</text>
    <rect x="14" y="172" width="142" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <rect x="26" y="183" width="11" height="11" rx="2" fill="#2563eb"/>
    <text x="45" y="193" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="12">页面浮窗</text>

    <g transform="translate(14 220)">
      <rect width="302" height="48" rx="8" fill="#ffffff" stroke="#d8dee8"/>
      <text x="12" y="23" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Instant</text>
      <text x="272" y="27" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="760">4</text>
      <text x="12" y="39" fill="#59657a" font-family="Inter, Arial, sans-serif" font-size="12">累计发送次数</text>
    </g>
    <g transform="translate(14 278)">
      <rect width="302" height="48" rx="8" fill="#ffffff" stroke="#d8dee8"/>
      <text x="12" y="23" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Extra High</text>
      <text x="263" y="27" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="760">12</text>
      <text x="12" y="39" fill="#59657a" font-family="Inter, Arial, sans-serif" font-size="12">累计发送次数</text>
    </g>
    <g transform="translate(14 336)">
      <rect width="302" height="48" rx="8" fill="#ffffff" stroke="#d8dee8"/>
      <text x="12" y="23" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Pro</text>
      <text x="272" y="27" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="760">2</text>
      <text x="12" y="39" fill="#59657a" font-family="Inter, Arial, sans-serif" font-size="12">累计发送次数</text>
    </g>

    <rect x="14" y="400" width="146" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <text x="78" y="421" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">+1</text>
    <rect x="170" y="400" width="146" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <text x="218" y="421" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">撤销一次</text>
    <rect x="14" y="442" width="302" height="32" rx="6" fill="#ffffff" stroke="#d8dee8"/>
    <text x="125" y="463" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">打开 ChatGPT</text>
  </g>
</svg>
